<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUANTUM IA</title>
    <link rel="stylesheet" href="history.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  </head>
  <body>
    <header>
      <div class="ai_logo"><span>!</span>QUANTUM AI</div>
      <!-- responsive menu -->
      <div class="menu_toggle"></div>
      <ul class="menu">
        <li><a href="index0.html">Home</a></li>
        <li><a href="debug.html">Debug</a></li>
        <li><a href="index0.html#about" class="about_link">About</a></li>
        <li><a href="index0.html">Contact</a></li>
      </ul>
    </header>

    <section class="history_container">
      <div class="history_header">
        <h1>AI Debug History</h1>
        <input
          type="text"
          id="searchInput"
          placeholder="Search code or model..."
        />
      </div>

      <div class="filter_buttons">
        <button data-filter="all" class="active">All</button>
        <button data-filter="1">Model 1</button>
        <button data-filter="2">Model 2</button>
        <button data-filter="3">Model 3</button>
        <button data-filter="4">Model 4</button>
      </div>

      <div id="historyList" class="history_list"></div>
    </section>

    <script src="history.js"></script>
  </body>
</html>
